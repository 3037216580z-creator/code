<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代码制作</title>
  <style>
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      color: #222;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      text-align: center;
    }

    .btn {
      display: inline-block;
      margin: 20px 0;
      padding: 10px 20px;
      border-radius: 5px;
      background-color: #07c160;
      color: white;
      font-size: 16px;
      text-decoration: none;
    }

    .btn:hover {
      background-color: #06ad56;
    }

    .tips {
      margin-top: 30px;
      color: #888;
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <h1>打开小程序</h1>
  <p>点击下方按钮将跳转到小程序制作</p>

  <button type="button" class="btn" disabled>制作入口暂未配置</button>

  <div class="tips">
    <p>如果无法正常跳转，请确保：</p>
    <p>1. 已安装最新版微信</p>
    <p>2. 当前环境支持 Scheme 跳转</p>
  </div>

</body>
</html>
